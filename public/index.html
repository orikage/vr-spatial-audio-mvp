<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR空間音声体験</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 16px;
}
h1 { font-size: 1.4em; margin-bottom: 8px; color: #a0d2db; }
.subtitle { font-size: 0.85em; color: #888; margin-bottom: 12px; }

.main-layout {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}

canvas {
  border: 2px solid #333;
  border-radius: 8px;
  cursor: crosshair;
  background: #0f0f23;
}

.controls {
  background: #16213e;
  border-radius: 8px;
  padding: 16px;
  min-width: 280px;
  max-width: 320px;
}

.control-group {
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid #2a2a4a;
}
.control-group:last-child { border-bottom: none; }
.control-group label {
  display: block;
  font-size: 0.85em;
  color: #aaa;
  margin-bottom: 4px;
}
.control-group .value {
  font-size: 1.1em;
  font-weight: bold;
  color: #e0e0e0;
}

input[type="range"] {
  width: 100%;
  margin: 4px 0;
  accent-color: #a0d2db;
}
select, button {
  background: #1a1a3e;
  color: #e0e0e0;
  border: 1px solid #444;
  border-radius: 4px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: 0.9em;
}
button:hover { background: #2a2a5e; }
button.primary {
  background: #a0d2db;
  color: #1a1a2e;
  font-weight: bold;
  padding: 10px;
  font-size: 1em;
}
button.primary:hover { background: #80b2bb; }

.btn-row { display: flex; gap: 8px; margin-top: 6px; }
.btn-row button { flex: 1; }

.stats {
  background: #0f0f23;
  border-radius: 6px;
  padding: 10px;
  font-family: 'Consolas', monospace;
  font-size: 0.8em;
  line-height: 1.6;
}
.stats .zone-near { color: #4ecdc4; }
.stats .zone-trans { color: #ffe66d; }
.stats .zone-amb  { color: #ff6b6b; }
.stats .label { color: #888; }

.source-list {
  max-height: 160px;
  overflow-y: auto;
}
.source-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 0;
  font-size: 0.82em;
}
.source-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* シナリオヘッダー */
.scenario-badge {
  font-size: 1em;
  font-weight: bold;
  color: #a0d2db;
  margin-bottom: 4px;
}
.scenario-desc-text {
  font-size: 0.82em;
  color: #aaa;
  margin-bottom: 6px;
  line-height: 1.4;
}
.person-count-text {
  font-size: 0.9em;
  color: #e0e0e0;
}
.person-count-text span {
  font-size: 1.2em;
  font-weight: bold;
  color: #4ecdc4;
}

/* 詳細設定 */
details { margin-top: 4px; }
details summary {
  font-size: 0.85em;
  color: #888;
  cursor: pointer;
  padding: 6px 0;
  border-top: 1px solid #2a2a4a;
  list-style: none;
  user-select: none;
}
details summary::-webkit-details-marker { display: none; }
details summary::before { content: '► '; font-size: 0.8em; }
details[open] summary::before { content: '▼ '; }
details .control-group { margin-top: 10px; }

/* スタートオーバーレイ */
#startOverlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.92);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
#startOverlay.hidden { display: none; }

.start-card {
  background: #16213e;
  border-radius: 12px;
  padding: 32px;
  max-width: 460px;
  width: 90%;
  text-align: center;
}
.start-card h2 {
  font-size: 1.8em;
  color: #a0d2db;
  margin-bottom: 6px;
}
.start-sub {
  color: #888;
  font-size: 0.95em;
  margin-bottom: 20px;
}
.scenario-btns {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  justify-content: center;
}
.scenario-btn {
  background: #0f0f23;
  border: 2px solid #333;
  border-radius: 8px;
  padding: 12px 8px;
  cursor: pointer;
  color: #e0e0e0;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  min-width: 0;
}
.scenario-btn:hover { border-color: #a0d2db; background: #1a1a3e; }
.scenario-btn.active { border-color: #a0d2db; background: #1a1a3e; }
.sc-name {
  font-size: 0.83em;
  font-weight: bold;
  color: #e0e0e0;
  line-height: 1.3;
}
.sc-detail { font-size: 0.73em; color: #888; }

.sc-desc-box {
  background: #0f0f23;
  border-radius: 6px;
  padding: 12px 16px;
  margin-bottom: 20px;
  font-size: 0.9em;
  color: #aaa;
  min-height: 44px;
  line-height: 1.5;
}
.start-btn {
  width: 100%;
  padding: 14px;
  font-size: 1.1em;
  font-weight: bold;
  background: #a0d2db;
  color: #1a1a2e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 10px;
}
.start-btn:hover { background: #80b2bb; }
.start-note { font-size: 0.78em; color: #555; }
</style>
</head>
<body>

<div id="startOverlay">
  <div class="start-card">
    <h2>VR空間音声体験</h2>
    <p class="start-sub">シナリオを選んで体験してみよう</p>
    <div class="scenario-btns" id="startScenarioBtns">
      <button class="scenario-btn active" data-id="cheering">
        <span class="sc-name">応援上映会場</span>
        <span class="sc-detail">40人 / 78dB</span>
      </button>
      <button class="scenario-btn" data-id="live">
        <span class="sc-name">ライブ会場</span>
        <span class="sc-detail">50人 / 82dB</span>
      </button>
      <button class="scenario-btn" data-id="cinema">
        <span class="sc-name">映画館（静粛）</span>
        <span class="sc-detail">20人 / 62dB</span>
      </button>
    </div>
    <div class="sc-desc-box" id="startScDesc">映画のクライマックス。周りから歓声が上がっている</div>
    <button class="start-btn" id="startBtn">体験スタート</button>
    <p class="start-note">クリックで音声再生を開始（ブラウザのAutoplay制限）</p>
  </div>
</div>

<h1>VR空間音声体験</h1>
<p class="subtitle" id="mainSubtitle">応援上映会場 — 周りに40人います</p>

<div class="main-layout">
  <div style="display:flex;flex-direction:column;gap:8px;">
    <canvas id="canvas" width="800" height="600"></canvas>
    <canvas id="spectrumCanvas" width="800" height="110" style="border:2px solid #333;border-radius:8px;background:#0f0f23;"></canvas>
  </div>

  <div class="controls">
    <div class="control-group">
      <div class="scenario-badge" id="scenarioName">応援上映会場</div>
      <div class="scenario-desc-text" id="scenarioDesc">映画のクライマックス。周りから歓声が上がっている</div>
      <div class="person-count-text">周りに <span id="personCount">40</span>人います</div>
    </div>

    <div class="control-group">
      <div class="btn-row">
        <button class="primary" id="playPause">⏸ 一時停止</button>
        <button id="changeScenario">シナリオ変更</button>
      </div>
    </div>

    <div class="control-group">
      <label>マスター音量</label>
      <input type="range" id="volumeSlider" min="0" max="100" value="30" step="1">
      <span class="value"><span id="volumeValue">30</span> %</span>
    </div>

    <details>
      <summary>詳細設定</summary>

      <div class="control-group">
        <label>会場騒音レベル (ambientNoiseSPL)</label>
        <input type="range" id="splSlider" min="55" max="85" value="78" step="1">
        <span class="value"><span id="splValue">78</span> dB</span>
      </div>

      <div class="control-group">
        <label>近傍同時再生上限 (maxNearVoices)</label>
        <select id="maxNearSelect">
          <option value="3">3</option>
          <option value="5" selected>5</option>
          <option value="7">7</option>
          <option value="10">10</option>
        </select>
      </div>

      <div class="control-group">
        <label>ゾーン境界</label>
        <div class="stats">
          <span class="label">d_near:</span> <span class="zone-near" id="statNear">3.2</span>m<br>
          <span class="label">d_trans:</span> <span class="zone-trans" id="statTrans">10.0</span>m<br>
          <span class="label">N_eff:</span> <span id="statNeff">0.00</span><br>
          <span class="label">AmbGain:</span> <span id="statAmbGain">0.00</span>
        </div>
      </div>

      <div class="control-group">
        <label>近くにいる人</label>
        <div class="source-list" id="sourceList"></div>
      </div>
    </details>
  </div>
</div>

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function smoothstep(t) { return 3 * t * t - 2 * t * t * t; }
function fCutoff(d) {
  const raw = 30000 / Math.pow(Math.max(d, 0.1), 2 / 3);
  return clamp(raw, 300, 20000);
}
function canvasToMeters(px, py) {
  return [(px - CANVAS_W / 2) / PIXELS_PER_METER, (py - CANVAS_H / 2) / PIXELS_PER_METER];
}
function metersToCanvas(mx, my) {
  return [mx * PIXELS_PER_METER + CANVAS_W / 2, my * PIXELS_PER_METER + CANVAS_H / 2];
}
function cutoffLabel(hz) {
  if (hz >= 12000) return 'クリア';
  if (hz >= 7000)  return 'やや明るい';
  if (hz >= 4000)  return 'やや曇る';
  if (hz >= 2000)  return 'こもる';
  return 'くぐもった声';
}
function updateZoneBoundaries() {
  dNear  = Math.pow(10, (SPL_REF - ambientNoiseSPL - 15) / 20);
  dTrans = Math.pow(10, (SPL_REF - ambientNoiseSPL -  5) / 20);
  document.getElementById('statNear').textContent  = dNear.toFixed(1);
  document.getElementById('statTrans').textContent = dTrans.toFixed(1);
}

// ============================================================
// 実音源バッファの読み込み
// ============================================================
async function loadCallBuffers() {
  callBuffers = await Promise.all(CALL_B64.map(b64 => {
    // base64 → ArrayBuffer → AudioBuffer（fetch不要、file://で動作）
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return ctx.decodeAudioData(bytes.buffer);
  }));
}

function initAudio() {
  ctx = new AudioContext({ sampleRate: 48000, latencyHint: 'interactive' });
  masterGain = ctx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(ctx.destination);

  // AmbientBus → AmbGain → 仮想8音源
  ambientBusGain = ctx.createGain();
  ambientBusGain.gain.value = 1;
  ambGainNode = ctx.createGain();
  ambGainNode.gain.value = 0;
  ambientBusGain.connect(ambGainNode);

  // スペクトルアナライザー
  analyserNode = ctx.createAnalyser();
  analyserNode.fftSize = 2048;
  analyserNode.smoothingTimeConstant = 0.8;
  masterGain.connect(analyserNode);
  analyserData = new Uint8Array(analyserNode.frequencyBinCount);

  // 仮想8音源（0°〜315°、45°刻み）
  for (let i = 0; i < 8; i++) {
    const angle = (i * 45) * Math.PI / 180;
    const radius = 2;

    const lfo = ctx.createOscillator();
    lfo.frequency.value = VIRTUAL_LFO_FREQS[i];
    lfo.start();

    const base = 1 / Math.sqrt(8);
    const modScaler = ctx.createGain();
    modScaler.gain.value = base * 0.3;
    lfo.connect(modScaler);

    const vGain = ctx.createGain();
    vGain.gain.value = base;
    modScaler.connect(vGain.gain);
    ambGainNode.connect(vGain);

    const vPanner = ctx.createPanner();
    vPanner.panningModel = 'equalpower';
    vPanner.distanceModel = 'inverse';
    vPanner.rolloffFactor = 0;
    vPanner.positionX.value = Math.sin(angle) * radius;
    vPanner.positionY.value = 0;
    vPanner.positionZ.value = -Math.cos(angle) * radius;

    vGain.connect(vPanner);
    vPanner.connect(masterGain);
    virtualGains.push(vGain);
    virtualPanners.push(vPanner);
  }
}

// ============================================================
// 音源の作成・削除
// ============================================================
function createSource(index, initMx, initMy) {
  const color = SOURCE_COLORS[index % SOURCE_COLORS.length];

  const mx = (initMx !== undefined) ? initMx
    : Math.cos(Math.random() * Math.PI * 2) * (5 + Math.random() * 10);
  const my = (initMy !== undefined) ? initMy
    : Math.sin(Math.random() * Math.PI * 2) * (5 + Math.random() * 10);

  // ---- 音声入力ゲート（ビートスケジューラーが毎ビート接続）----
  const inputGain = ctx.createGain();
  inputGain.gain.value = 1;
  const bufIdx = index % callBuffers.length;
  const playbackRate = 0.87 + (index % 7) * (0.26 / 6);
  const beatOffset = (Math.random() * 2 - 1) * BEAT_OFFSET_RANGE;

  // ---- 3パス接続（inputGain が音源）----
  // nearパス: HighShelf → HRTF Panner → NearGain → Master
  const highShelf = ctx.createBiquadFilter();
  highShelf.type = 'highshelf';
  highShelf.frequency.value = 3000;
  highShelf.gain.value = 2;

  const nearPanner = ctx.createPanner();
  nearPanner.panningModel = 'HRTF';
  nearPanner.distanceModel = 'inverse';
  nearPanner.rolloffFactor = 0;
  nearPanner.maxDistance = 10000;

  const nearGain = ctx.createGain();
  nearGain.gain.value = 0;

  inputGain.connect(highShelf);
  highShelf.connect(nearPanner);
  nearPanner.connect(nearGain);
  nearGain.connect(masterGain);

  // transパス: LowPass → EqualPower Panner → TransGain → Master
  const lowPass = ctx.createBiquadFilter();
  lowPass.type = 'lowpass';
  lowPass.frequency.value = 20000;

  const transPanner = ctx.createPanner();
  transPanner.panningModel = 'equalpower';
  transPanner.distanceModel = 'inverse';
  transPanner.rolloffFactor = 0;
  transPanner.maxDistance = 10000;

  const transGain = ctx.createGain();
  transGain.gain.value = 0;

  inputGain.connect(lowPass);
  lowPass.connect(transPanner);
  transPanner.connect(transGain);
  transGain.connect(masterGain);

  // ambientパス: IndivAmbGain → AmbientBus
  const indivAmbGain = ctx.createGain();
  indivAmbGain.gain.value = 0;
  inputGain.connect(indivAmbGain);
  indivAmbGain.connect(ambientBusGain);

  return {
    index, color, mx, my,
    inputGain, bufIdx, playbackRate, beatOffset,
    highShelf, nearPanner, nearGain,
    lowPass, transPanner, transGain,
    indivAmbGain,
    distance: 0, zone: 'ambient', rank: 0, tS: 0,
    currentNearGain: 0, currentTransGain: 0, currentAmbGain: 0, currentCutoff: 20000,
    wanderAngle: Math.random() * Math.PI * 2,
    stepTimer: Math.floor(Math.random() * 20),
  };
}

function destroySource(source) {
  [
    source.inputGain,
    source.highShelf, source.nearPanner, source.nearGain,
    source.lowPass, source.transPanner, source.transGain,
    source.indivAmbGain,
  ].forEach(n => { try { n.disconnect(); } catch(e) {} });
}

function beatScheduler() {
  const lookAhead = 0.1;
  while (nextBeatTime < ctx.currentTime + lookAhead) {
    for (const s of sources) {
      const playTime = Math.max(nextBeatTime + s.beatOffset, ctx.currentTime + 0.005);
      const node = ctx.createBufferSource();
      node.buffer = callBuffers[s.bufIdx];
      node.playbackRate.value = s.playbackRate;
      node.connect(s.inputGain);
      node.start(playTime);
      node.onended = () => { try { node.disconnect(); } catch(e) {} };
    }
    nextBeatTime += BEAT_INTERVAL;
  }
}

function startBeatScheduler() {
  stopBeatScheduler();
  nextBeatTime = ctx.currentTime + 0.5;
  beatSchedulerTimer = setInterval(beatScheduler, 25);
}

function stopBeatScheduler() {
  if (beatSchedulerTimer) { clearInterval(beatSchedulerTimer); beatSchedulerTimer = null; }
}

// ============================================================
// 初期配置生成
// ============================================================
function generateInitialPositions(layout, count) {
  const pos = [];
  if (layout === 'fan') {
    for (let i = 0; i < count; i++) {
      const angle = -Math.PI * 0.6 + Math.random() * Math.PI * 1.2;
      const dist  = 3 + Math.pow(Math.random(), 0.7) * 15;
      pos.push({ mx: Math.cos(angle) * dist, my: -Math.sin(angle) * dist });
    }
  } else if (layout === 'circle') {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist  = 2 + Math.pow(Math.random(), 0.5) * 13;
      pos.push({ mx: Math.cos(angle) * dist, my: Math.sin(angle) * dist });
    }
  } else {  // grid（映画館）
    const cols = 5;
    for (let i = 0; i < count; i++) {
      const row = Math.floor(i / cols);
      const col = i % cols;
      pos.push({
        mx: (col - 2) * 4 + (Math.random() - 0.5) * 1.5,
        my: -3 - row * 4  + (Math.random() - 0.5) * 1.5,
      });
    }
  }
  return pos;
}

// ============================================================
// ランダムウォーク
// ============================================================
function wanderUpdate() {
  const speed = SCENARIOS[currentScenario].wanderSpeed;
  if (speed === 0) return;
  for (const s of sources) {
    if (s === draggingSource) continue;
    s.stepTimer -= 1;
    if (s.stepTimer <= 0) {
      s.wanderAngle += (Math.random() - 0.5) * 0.6;
      s.stepTimer = 10 + Math.floor(Math.random() * 20);
    }
    let nx = s.mx + Math.cos(s.wanderAngle) * speed;
    let ny = s.my + Math.sin(s.wanderAngle) * speed;
    if (nx < -18 || nx > 18) { s.wanderAngle = Math.PI - s.wanderAngle; nx = s.mx; }
    if (ny < -14 || ny > 14) { s.wanderAngle = -s.wanderAngle; ny = s.my; }
    s.mx = nx;
    s.my = ny;
  }
}

// ============================================================
// シナリオリセット
// ============================================================
function resetScenario(id) {
  currentScenario = id;
  const sc = SCENARIOS[id];

  for (const s of sources) destroySource(s);
  sources = [];

  ambientNoiseSPL = sc.ambientNoiseSPL;
  document.getElementById('splSlider').value = ambientNoiseSPL;
  document.getElementById('splValue').textContent  = ambientNoiseSPL;
  updateZoneBoundaries();

  const positions = generateInitialPositions(sc.layout, sc.count);
  for (let i = 0; i < positions.length; i++) {
    sources.push(createSource(i, positions[i].mx, positions[i].my));
  }

  document.getElementById('scenarioName').textContent = sc.name;
  document.getElementById('scenarioDesc').textContent = sc.description;
  document.getElementById('personCount').textContent  = sc.count;
  document.getElementById('mainSubtitle').textContent = `${sc.name} — 周りに${sc.count}人います`;

  if (wanderTimer) clearInterval(wanderTimer);
  wanderTimer = (sc.wanderSpeed > 0) ? setInterval(wanderUpdate, 100) : null;

  startBeatScheduler();
}

// ============================================================
// 音響パラメータの毎フレーム更新（ロジック変更なし）
// ============================================================
function updateAudio() {
  if (!ctx || !isPlaying) return;
  const now = ctx.currentTime;

  const fNear  = fCutoff(dNear);
  const fTrans = fCutoff(dTrans);

  for (const s of sources) {
    s.distance = Math.sqrt(s.mx * s.mx + s.my * s.my);
    if (s.distance < 0.01) s.distance = 0.01;
  }

  const nearSources = sources.filter(s => s.distance < dTrans);
  nearSources.sort((a, b) => a.distance - b.distance);
  for (const s of sources) s.rank = 0;
  nearSources.forEach((s, i) => s.rank = i + 1);

  let nEff = 0;

  for (const s of sources) {
    const d = s.distance;
    const gainPhysical = 1 / d;

    const t  = clamp((d - dNear) / (dTrans - dNear), 0, 1);
    const tS = smoothstep(t);
    s.tS = tS;

    const cutoff = (tS === 0) ? 20000
                 : (tS === 1) ? fCutoff(d)
                 : Math.exp(Math.log(fNear) * (1 - tS) + Math.log(fTrans) * tS);

    let gNear = gainPhysical * (1 - tS);
    let gTrans = gainPhysical * tS;
    let gAmb   = gainPhysical * tS;

    const softCapStart = maxNearVoices + 1;
    const softCapEnd   = maxNearVoices + 3;

    if (s.rank > 0 && s.rank <= maxNearVoices) {
      // near 100%: そのまま
    } else if (s.rank >= softCapStart && s.rank <= softCapEnd) {
      gNear  = gainPhysical * 0.5;
      gAmb   = gainPhysical * 0.5;
      gTrans = 0;
    } else if (s.rank > softCapEnd || s.rank === 0) {
      if (d < dNear) {
        gNear  = 0;
        gTrans = 0;
        gAmb   = gainPhysical;
      }
    }

    s.zone = (d <= dNear) ? 'near' : (d <= dTrans) ? 'transition' : 'ambient';
    nEff += tS * tS;

    const posX = s.mx;
    const posZ = -s.my;

    // nearパンナーは near/transition ゾーンのみ更新（パフォーマンス最適化）
    if (d < dTrans * 1.5) {
      s.nearPanner.positionX.setValueAtTime(posX, now);
      s.nearPanner.positionZ.setValueAtTime(posZ, now);
    }
    s.transPanner.positionX.setValueAtTime(posX, now);
    s.transPanner.positionZ.setValueAtTime(posZ, now);

    s.nearGain.gain.setTargetAtTime(gNear,  now, 0.05);
    s.transGain.gain.setTargetAtTime(gTrans, now, 0.05);
    s.indivAmbGain.gain.setTargetAtTime(gAmb,  now, 0.05);
    s.lowPass.frequency.setTargetAtTime(cutoff, now, 0.02);

    s.currentNearGain  = gNear;
    s.currentTransGain = gTrans;
    s.currentAmbGain   = gAmb;
    s.currentCutoff    = cutoff;
  }

  const nEffSafe       = Math.max(nEff, 0.001);
  const gainNormalized = 1 / Math.sqrt(nEffSafe);
  const densityBoostDB = 6 * Math.tanh(nEffSafe / 30);
  const gainDensity    = Math.pow(10, densityBoostDB / 20);
  const totalAmbGain   = (nEff < 0.001) ? 0 : gainNormalized * gainDensity;

  ambGainNode.gain.setTargetAtTime(totalAmbGain, now, 0.05);

  document.getElementById('statNeff').textContent    = nEff.toFixed(2);
  document.getElementById('statAmbGain').textContent = totalAmbGain.toFixed(3);
}

// ============================================================
// Canvas描画（大人数対応）
// ============================================================
const canvas = document.getElementById('canvas');
const cctx = canvas.getContext('2d');

function draw() {
  cctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // グリッド
  cctx.strokeStyle = '#1a1a3e';
  cctx.lineWidth = 0.5;
  for (let x = 0; x < CANVAS_W; x += PIXELS_PER_METER * 5) {
    cctx.beginPath(); cctx.moveTo(x, 0); cctx.lineTo(x, CANVAS_H); cctx.stroke();
  }
  for (let y = 0; y < CANVAS_H; y += PIXELS_PER_METER * 5) {
    cctx.beginPath(); cctx.moveTo(0, y); cctx.lineTo(CANVAS_W, y); cctx.stroke();
  }

  const cx = CANVAS_W / 2;
  const cy = CANVAS_H / 2;

  // d_trans（赤）
  cctx.beginPath();
  cctx.arc(cx, cy, dTrans * PIXELS_PER_METER, 0, Math.PI * 2);
  cctx.strokeStyle = 'rgba(255,107,107,0.3)';
  cctx.lineWidth = 2;
  cctx.setLineDash([8, 4]);
  cctx.stroke();
  cctx.setLineDash([]);

  // d_near（緑）
  cctx.beginPath();
  cctx.arc(cx, cy, dNear * PIXELS_PER_METER, 0, Math.PI * 2);
  cctx.strokeStyle = 'rgba(78,205,196,0.4)';
  cctx.lineWidth = 2;
  cctx.stroke();

  // ゾーンラベル
  cctx.font = '11px sans-serif';
  cctx.fillStyle = 'rgba(78,205,196,0.6)';
  cctx.fillText(`near (${dNear.toFixed(1)}m)`, cx + dNear * PIXELS_PER_METER + 4, cy - 4);
  cctx.fillStyle = 'rgba(255,107,107,0.6)';
  cctx.fillText(`ambient (${dTrans.toFixed(1)}m)`, cx + dTrans * PIXELS_PER_METER + 4, cy - 4);

  // 音源（人物）描画
  for (const s of sources) {
    const [sx, sy] = metersToCanvas(s.mx, s.my);
    if (sx < -20 || sx > CANVAS_W + 20 || sy < -20 || sy > CANVAS_H + 20) continue;

    // ゾーンに応じてサイズ・透明度を変える
    const radius = s.zone === 'near' ? 8 : s.zone === 'transition' ? 6 : 4;
    const alpha  = s.zone === 'near' ? 1.0 : s.zone === 'transition' ? 0.75 : 0.45;

    cctx.globalAlpha = alpha;
    cctx.beginPath();
    cctx.arc(sx, sy, radius, 0, Math.PI * 2);
    cctx.fillStyle = s.color;
    cctx.fill();

    if (s.zone === 'near' || s.zone === 'transition') {
      cctx.strokeStyle = '#fff';
      cctx.lineWidth = 1.5;
      cctx.stroke();
    }
    cctx.globalAlpha = 1;

    // nearゾーンの人のみ距離ラベル
    if (s.zone === 'near') {
      cctx.font = '10px monospace';
      cctx.fillStyle = '#ddd';
      cctx.fillText(`${s.distance.toFixed(1)}m  ${cutoffLabel(s.currentCutoff)}`, sx + 11, sy + 4);
    }
  }

  // リスナー（中央）
  cctx.beginPath();
  cctx.arc(cx, cy, 8, 0, Math.PI * 2);
  cctx.fillStyle = '#fff';
  cctx.fill();
  cctx.font = '10px sans-serif';
  cctx.fillStyle = '#aaa';
  cctx.fillText('あなた', cx + 12, cy + 4);
}

// ============================================================
// スペクトルアナライザー描画
// ============================================================
const specCanvas = document.getElementById('spectrumCanvas');
const sctx = specCanvas.getContext('2d');
const SPEC_W = 800;
const SPEC_H = 110;
const FREQ_MIN = 20;
const FREQ_MAX = 20000;

function freqToX(freq) {
  const logMin = Math.log10(FREQ_MIN);
  const logMax = Math.log10(FREQ_MAX);
  return (Math.log10(Math.max(freq, FREQ_MIN)) - logMin) / (logMax - logMin) * SPEC_W;
}

function drawSpectrum() {
  sctx.clearRect(0, 0, SPEC_W, SPEC_H);
  const AXIS_H = 18;
  const BAR_H  = SPEC_H - AXIS_H;

  sctx.fillStyle = '#0f0f23';
  sctx.fillRect(0, 0, SPEC_W, SPEC_H);

  if (!analyserNode) return;

  analyserNode.getByteFrequencyData(analyserData);
  const bufLen     = analyserData.length;
  const sampleRate = 48000;

  for (let i = 1; i < bufLen; i++) {
    const freq     = (i / bufLen) * (sampleRate / 2);
    const freqPrev = ((i - 1) / bufLen) * (sampleRate / 2);
    if (freq > FREQ_MAX) break;
    const x  = freqToX(freqPrev);
    const w  = Math.max(freqToX(freq) - x, 0.5);
    const h  = (analyserData[i] / 255) * BAR_H * 0.9;
    const hue = 200 - (freq / FREQ_MAX) * 100;
    sctx.fillStyle = `hsla(${hue}, 65%, 55%, 0.85)`;
    sctx.fillRect(x, BAR_H - h, w, h);
  }

  const freqLabels = [100,300,500,1000,2000,3000,5000,8000,10000,20000];
  sctx.font = '9px sans-serif';
  for (const f of freqLabels) {
    const x = freqToX(f);
    sctx.strokeStyle = '#2a2a4a'; sctx.lineWidth = 1;
    sctx.beginPath(); sctx.moveTo(x, 0); sctx.lineTo(x, BAR_H); sctx.stroke();
    sctx.fillStyle = '#555';
    sctx.fillText(f >= 1000 ? `${f/1000}k` : `${f}`, x - 6, SPEC_H - 2);
  }

  const rangeLabels = [{freq:300,text:'低音'},{freq:1000,text:'中音'},{freq:5000,text:'高音'},{freq:15000,text:'超高音'}];
  for (const r of rangeLabels) { sctx.fillStyle = '#333'; sctx.fillText(r.text, freqToX(r.freq) + 2, 10); }

  // cutoff縦線はnear/transitionゾーンの音源のみ（最大10本）
  let lineCount = 0;
  for (const s of sources) {
    if (s.zone === 'ambient') continue;
    if (lineCount >= 10) break;
    const x = freqToX(s.currentCutoff);
    sctx.strokeStyle = s.color;
    sctx.lineWidth = 2;
    sctx.setLineDash([4, 3]);
    sctx.globalAlpha = 0.9;
    sctx.beginPath(); sctx.moveTo(x, 0); sctx.lineTo(x, BAR_H - 2); sctx.stroke();
    sctx.setLineDash([]);
    sctx.globalAlpha = 1;
    sctx.font = 'bold 9px monospace';
    sctx.fillStyle = s.color;
    sctx.fillText(`#${s.index + 1}`, x + 2, 20 + lineCount * 11);
    lineCount++;
  }

  sctx.font = '10px sans-serif';
  sctx.fillStyle = '#666';
  sctx.fillText('周波数スペクトル  点線 = near/transition音源のローパスcutoff', 4, 10);
}

// ============================================================
// 音源一覧UI更新（near/transitionのみ表示）
// ============================================================
function updateSourceList() {
  const list = document.getElementById('sourceList');
  list.innerHTML = '';

  const visible = sources
    .filter(s => s.zone !== 'ambient')
    .sort((a, b) => a.distance - b.distance);

  const ambCount = sources.length - visible.length;

  for (const s of visible) {
    const zoneClass = s.zone === 'near' ? 'zone-near' : 'zone-trans';
    const el = document.createElement('div');
    el.className = 'source-item';
    el.innerHTML = `
      <span class="source-dot" style="background:${s.color}"></span>
      <span class="${zoneClass}">${s.distance.toFixed(1)}m [${s.zone}]</span>
      <span style="color:#666;font-size:0.9em">${cutoffLabel(s.currentCutoff)}</span>
    `;
    list.appendChild(el);
  }

  if (ambCount > 0) {
    const el = document.createElement('div');
    el.className = 'source-item';
    el.style.color = '#555';
    el.textContent = `...他 ${ambCount}人が遠くにいます`;
    list.appendChild(el);
  }
}

// ============================================================
// メインループ
// ============================================================
function mainLoop() {
  updateAudio();
  draw();
  drawSpectrum();
  if (frameCount % 6 === 0) updateSourceList();  // 10fps で更新
  frameCount++;
  requestAnimationFrame(mainLoop);
}

// ============================================================
// マウスイベント（ドラッグ）
// ============================================================
canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const px = (e.clientX - rect.left) * (CANVAS_W / rect.width);
  const py = (e.clientY - rect.top)  * (CANVAS_H / rect.height);
  for (const s of sources) {
    const [sx, sy] = metersToCanvas(s.mx, s.my);
    if ((px-sx)**2 + (py-sy)**2 < 15*15) { draggingSource = s; return; }
  }
});
canvas.addEventListener('mousemove', (e) => {
  if (!draggingSource) return;
  const rect = canvas.getBoundingClientRect();
  const px = (e.clientX - rect.left) * (CANVAS_W / rect.width);
  const py = (e.clientY - rect.top)  * (CANVAS_H / rect.height);
  [draggingSource.mx, draggingSource.my] = canvasToMeters(px, py);
});
canvas.addEventListener('mouseup',    () => { draggingSource = null; });
canvas.addEventListener('mouseleave', () => { draggingSource = null; });

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect  = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const px = (touch.clientX - rect.left) * (CANVAS_W / rect.width);
  const py = (touch.clientY - rect.top)  * (CANVAS_H / rect.height);
  for (const s of sources) {
    const [sx, sy] = metersToCanvas(s.mx, s.my);
    if ((px-sx)**2 + (py-sy)**2 < 25*25) { draggingSource = s; return; }
  }
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!draggingSource) return;
  const rect  = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const px = (touch.clientX - rect.left) * (CANVAS_W / rect.width);
  const py = (touch.clientY - rect.top)  * (CANVAS_H / rect.height);
  [draggingSource.mx, draggingSource.my] = canvasToMeters(px, py);
}, { passive: false });
canvas.addEventListener('touchend', () => { draggingSource = null; });

// 体験スタートボタン
document.getElementById('startBtn').addEventListener('click', async () => {
  const selectedId = document.querySelector('.scenario-btn.active').dataset.id;
  const btn = document.getElementById('startBtn');

  if (!ctx) {
    // 初回起動：音声ファイルを読み込んでから開始

    initAudio();

      console.error(e);
      return;
    }
    btn.textContent = '体験スタート';
    btn.disabled = false;
    document.getElementById('startOverlay').classList.add('hidden');
    updateZoneBoundaries();
    resetScenario(selectedId);
    mainLoop();
  } else {
    // シナリオ変更
    document.getElementById('startOverlay').classList.add('hidden');
    resetScenario(selectedId);
    if (!isPlaying) {
      ctx.resume();
      isPlaying = true;
      document.getElementById('playPause').textContent = '⏸ 一時停止';
    }
  }
});
</script>
</body>
</html>
