server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip圧縮
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/html text/css application/javascript audio/wav application/json;

    # セキュリティヘッダ
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Web Audio API + 将来のWebXR対応
    add_header Permissions-Policy "autoplay=(self), xr-spatial-tracking=(self), gyroscope=(self), accelerometer=(self)" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 音声ファイルキャッシュ
    location ~* \.(wav|mp3|ogg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ヘルスチェック
    location /healthz {
        access_log off;
        return 200 "ok";
    }
}
